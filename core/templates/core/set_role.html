<!DOCTYPE html>
<html>
<head>
  <title>Choose Your Role</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .card { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); width: 320px; text-align: center; }
    h1 { color: #333; margin-bottom: 10px; }
    p { color: #666; margin-bottom: 25px; }
    .btn { display: block; width: 100%; padding: 14px; margin: 10px 0; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; color: white; }
    .btn-driver { background: #007bff; }
    .btn-driver:hover { background: #0056b3; }
    .btn-passenger { background: #28a745; }
    .btn-passenger:hover { background: #1e7e34; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Welcome!</h1>
    <p>You signed in with Google. Please choose your role to continue:</p>
    <form method="POST">
      {% csrf_token %}
      <button type="submit" name="role" value="driver" class="btn btn-driver">🚗 I'm a Driver</button>
      <button type="submit" name="role" value="passenger" class="btn btn-passenger">🧍 I'm a Passenger</button>
    </form>
  </div>
</body>
</html>
