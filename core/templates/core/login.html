<!DOCTYPE html>
<html>
<head>
    <title>Carpooling Login</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); width: 300px; }
        h1 { text-align: center; color: #333; margin-bottom: 30px; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .btn { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .btn:hover { background: #0056b3; }
        .error { color: red; text-align: center; margin-bottom: 10px; }
        .register-link { text-align: center; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Carpooling</h1>
        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="btn">Login</button>
        </form>
        <div class="register-link">
            <a href="/dashboard/register/">Register here</a>
        </div>
        <hr style="margin: 20px 0;">
        <a href="/accounts/google/login/" style="display:block; text-align:center; padding:10px; background:#fff; border:1px solid #ddd; border-radius:4px; color:#333; text-decoration:none;">
            Sign in with Google
        </a>
    </div>
</body>
</html>
